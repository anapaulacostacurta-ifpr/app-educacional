<!-- html/ranking/ranking.html -->
<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <link rel="shortcut icon" href="../../assets/img/favicon.png" type="image/png">
        <!-- Estilos -->
        <link rel="stylesheet" href="../../assets/css/style.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
        <!-- Firebase SDK -->
        <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-auth-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-firestore-compat.js"></script>
        <script src="../../firebase-init.js"></script>
        <script src="../../auth-guard.js"></script>
        <script src="../../services/user.service.js"></script>
        <script src="../../logout.js"></script>
        <style>
            body { background: transparent; padding: 15px; }
        </style>
    </head>
    <body>
        <div class="row g-3">
            <div class="col-12 col-md-6">
                <div class="card p-3 shadow-sm border-0">
                    <h6 class="fw-bold text-success text-center">🏆 Ranking de Líderes</h6>
                    <table class="table table-sm small">
                        <thead><tr><th>Pos</th><th>Player</th><th>Score</th></tr></thead>
                        <tbody id="ranking-body"></tbody>
                    </table>
                </div>
            </div>
            <div class="col-12 col-md-6">
                <div class="card p-3 shadow-sm border-0">
                    <h6 class="fw-bold text-primary text-center">📊 Precisão da Turma</h6>
                    <div id="performance-list" class="small"></div>
                </div>
            </div>
        </div>
        <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-auth-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-firestore-compat.js"></script>
        <script src="../../firebase-init.js"></script>
        <script src="ranking.js"></script>
    </body>
</html>

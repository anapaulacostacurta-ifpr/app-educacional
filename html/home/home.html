<!DOCTYPE html>
<html class="wallpaper" lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>GamificaEduk - Home</title>
        <link rel="shortcut icon" href="../../assets/img/favicon.png" type="image/png">
        <!-- Estilos -->
        <link rel="stylesheet" href="../../assets/css/style.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
        <!-- Firebase SDK -->
        <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-auth-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-firestore-compat.js"></script>
        <script src="../../firebase-init.js"></script>
        <script src="../../auth-guard.js"></script>
        <script src="../../services/user.service.js"></script>
        <script src="../../logout.js"></script>
    </head>
    <body class="wallpaper">

        <!-- Header com Z-index para visibilidade garantida -->
        <header class="p-3 text-white sticky-top shadow-lg" style="background-color: rgba(13, 110, 253, 0.9); z-index: 1060;">
            <div class="container-fluid d-flex align-items-center">
                <!-- Ícone Hamburger (Menu Lateral) -->
                <button class="btn btn-link text-white p-0 me-3" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasMenu" style="text-decoration: none;">
                    <i class="fas fa-bars fa-2x"><img src="../../assets/img/menu_white_36dp.svg" alt=""></i>
                </button>
                
                <h1 class="h5 mb-0 fw-bold text-uppercase flex-grow-1" style="letter-spacing: 1px;">Redes de Computadores</h1>
                
                <div class="d-flex align-items-center gap-2">
                    <!-- Perfil do usuário -->
                    <div id="profile" class="text-center ms-auto">
                        <p class="mb-0">
                            <span id="avatarUser" aria-hidden="true"></span><br>
                            <span id="nameUser"></span>
                        </p>
                    </div>
                
                </div>
            </div>
        </header>

        <!-- Menu Lateral Oculto (Offcanvas) -->
        <div class="offcanvas offcanvas-start shadow" tabindex="-1" id="offcanvasMenu" style="width: 280px; z-index: 1070;">
            <div class="offcanvas-header bg-primary text-white">
                <h5 class="offcanvas-title fw-bold">MENU NAVEGAÇÃO</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
            </div>
            <div class="offcanvas-body p-0">
                <!-- Seu gradiente padrão -->
                <hr class="colorgraph m-0" style="height: 6px;">
                
                <!-- Botões dinâmicos carregados via home.js -->
                <div id="main-menu" class="list-group list-group-flush">
                    <div class="text-center py-5">
                        <div class="spinner-border text-primary" role="status"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Área do Iframe (Conteúdo Central) -->
        <main class="container-fluid p-0">
            <div class="ratio ratio-16x9" style="height: calc(100vh - 80px);">
                <iframe id="content-iframe" src="../binarios/conteudo.html" title="Conteúdo" class="border-0 w-100 h-100" allowfullscreen></iframe>
            </div>
        </main>

        <!-- Scripts Finais -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="home.js"></script>
    </body>
</html>

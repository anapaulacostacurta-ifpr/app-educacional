<!DOCTYPE html>
<html class="wallpaper" lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>GamificaEduk - Home</title>
        <link rel="shortcut icon" href="../../assets/img/favicon.png" type="image/png">
        <!-- Estilos -->
        <link rel="stylesheet" href="../../assets/css/style.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
        <!-- Firebase SDK -->
        <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-auth-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-firestore-compat.js"></script>
        <script src="../../firebase-init.js"></script>
        <script src="../../auth-guard.js"></script>
        <script src="../../services/user.service.js"></script>
        <script src="../../logout.js"></script>
    </head>
    <body class="wallpaper">
        <!-- Header com Botão Hamburger -->
        <header class="p-3 text-white shadow-sm border-bottom border-secondary bg-dark bg-opacity-25 sticky-top">
            <div class="container d-flex align-items-center">
                <!-- Ícone de 3 riscos -->
                <button class="btn text-white me-3" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasMenu">
                    <i class="fas fa-bars fa-lg"></i>
                </button>
                
                <h1 class="h5 mb-0 fw-bold text-uppercase flex-grow-1">GamificaEduk</h1>
                
                <div class="d-flex align-items-center gap-2">
                    <span id="profile-tag" class="badge bg-primary d-none d-sm-inline-block">Carregando...</span>
                    <button onclick="logout()" class="btn btn-sm btn-outline-light"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>
        </header>

        <!-- Menu Lateral Oculto (Offcanvas) -->
        <div class="offcanvas offcanvas-start bg-light" tabindex="-1" id="offcanvasMenu" style="width: 280px;">
            <div class="offcanvas-header border-bottom">
                <h5 class="offcanvas-title fw-bold text-dark">MENU PRINCIPAL</h5>
                <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
            </div>
            <div class="offcanvas-body p-0">
                <hr class="colorgraph m-0">
                <!-- Botões do Menu Injetados via JS -->
                <div id="main-menu" class="list-group list-group-flush">
                    <div class="text-center p-4">
                        <div class="spinner-border spinner-border-sm text-primary"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Área de Conteúdo Central -->
        <main class="container my-4">
            <div class="card card-container p-4 shadow-sm border-0 min-vh-75">
                <div id="content-display">
                    <div class="text-center py-5">
                        <i class="fas fa-arrow-left fa-3x text-muted opacity-25 mb-3"></i>
                        <h2 class="h5 text-muted">Seja bem-vindo(a)!</h2>
                        <p class="text-muted small">Abra o menu no canto superior esquerdo para acessar os conteúdos.</p>
                    </div>
                </div>
            </div>
        </main>

        <!-- Bootstrap Bundle JS -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="home.js"></script>
    </body>
</html>

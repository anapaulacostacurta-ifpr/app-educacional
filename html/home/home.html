<!DOCTYPE html>
<html class="wallpaper" lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>GamificaEduk - Home</title>
        <link rel="shortcut icon" href="../../assets/img/favicon.png" type="image/png">
        <!-- Estilos -->
        <link rel="stylesheet" href="../../assets/css/style.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
        <!-- Firebase SDK -->
        <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-auth-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-firestore-compat.js"></script>
        <script src="../../firebase-init.js"></script>
        <script src="../../auth-guard.js"></script>
        <script src="../../logout.js"></script>
    </head>
    <body class="wallpaper">

        <header class="p-3 text-white shadow-sm border-bottom border-secondary bg-dark bg-opacity-25">
            <div class="container d-flex justify-content-between align-items-center">
                <h1 class="h5 mb-0 fw-bold text-uppercase tracking-wider">GamificaEduk</h1>
                <div class="d-flex align-items-center gap-3">
                    <span id="profile-tag" class="badge bg-primary">Perfil: ...</span>
                    <button onclick="logout()" class="btn btn-sm btn-outline-light"><i class="fas fa-sign-out-alt"></i> Sair</button>
                </div>
            </div>
        </header>

        <main class="container my-4">
            <div class="row">
                <!-- COLUNA DO MENU -->
                <aside class="col-md-4 mb-4">
                    <div class="card card-container p-3 shadow-sm border-0 h-100">
                        <h2 class="h6 fw-bold mb-3 text-secondary uppercase"><i class="fas fa-bars me-2"></i>Menu Principal</h2>
                        <hr class="colorgraph mb-4">
                        
                        <!-- MENU DINÂMICO (ALUNO/PROFESSOR) -->
                        <div id="main-menu" class="d-grid gap-2">
                            <!-- Botões injetados via JS -->
                        </div>
                    </div>
                </aside>

                <!-- COLUNA DO CONTEÚDO -->
                <section class="col-md-8">
                    <div class="card card-container p-4 shadow-sm border-0 min-vh-50">
                        <div id="content-display">
                            <div class="text-center py-5">
                                <div class="spinner-border text-primary" role="status"></div>
                                <p class="mt-2 text-muted">Carregando sua trilha...</p>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </main>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="home.js"></script>
    </body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Missão Binária - GamificaEduk</title>
        <link rel="shortcut icon" href="../../assets/img/favicon.png" type="image/png">
        <!-- Estilos -->
        <link rel="stylesheet" href="../../assets/css/style.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
        <!-- Firebase SDK -->
        <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-auth-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-firestore-compat.js"></script>
        <script src="../../firebase-init.js"></script>
        <script src="../../auth-guard.js"></script>
        <script src="../../services/user.service.js"></script>
        <script src="../../logout.js"></script>
        
        <!-- Estilos específicos do jogo -->
        <style>
            body { background: transparent; padding: 10px; font-family: 'Segoe UI', sans-serif; }
            .bit-container { gap: 1rem; }
            .bit-btn-custom { 
                width: 60px; height: 60px; font-size: 1.5rem; 
                border-width: 3px; transition: all 0.2s; 
            }
            .display-target { font-size: 3.5rem; color: #0d6efd; font-weight: 900; }
            .card-game { border-radius: 20px; border: none; box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
            
            @media (max-width: 576px) {
                .bit-btn-custom { width: 50px; height: 50px; font-size: 1.2rem; }
                .bit-container { gap: 0.5rem; }
            }
        </style>
    </head>
    <body>

        <main class="container-fluid">
            <div class="card card-game p-3 bg-white">

                <!-- Alvo Decimal -->
                <div class="text-center my-3">
                    <span class="text-muted small d-block text-uppercase fw-bold">Converta o número:</span>
                    <h2 class="display-target" id="decimal-target">5</h2>
                </div>

                <!-- Controles de Bits -->
                <div class="d-flex justify-content-center bit-container my-4">
                    <div class="text-center">
                        <div class="small fw-bold text-muted mb-1">8</div>
                        <button type="button" class="btn btn-outline-dark rounded-circle bit-btn-custom" id="bit3" onclick="toggleBit('bit3')">0</button>
                    </div>
                    <div class="text-center">
                        <div class="small fw-bold text-muted mb-1">4</div>
                        <button type="button" class="btn btn-outline-dark rounded-circle bit-btn-custom" id="bit2" onclick="toggleBit('bit2')">0</button>
                    </div>
                    <div class="text-center">
                        <div class="small fw-bold text-muted mb-1">2</div>
                        <button type="button" class="btn btn-outline-dark rounded-circle bit-btn-custom" id="bit1" onclick="toggleBit('bit1')">0</button>
                    </div>
                    <div class="text-center">
                        <div class="small fw-bold text-muted mb-1">1</div>
                        <button type="button" class="btn btn-outline-dark rounded-circle bit-btn-custom" id="bit0" onclick="toggleBit('bit0')">0</button>
                    </div>
                </div>

                <!-- Preview da Conversão -->
                <div class="text-center bg-light rounded-pill py-2 mb-4 border shadow-sm">
                    <span class="small text-muted">BINÁRIO:</span> 
                    <strong id="binary-preview" class="font-monospace text-success mx-2">0000</strong>
                    <span class="text-muted mx-1">➜</span>
                    <span class="small text-muted">DECIMAL:</span>
                    <strong id="decimal-preview" class="text-primary mx-2">0</strong>
                </div>

                <!-- Ação Final -->
                <button class="btn btn-success btn-lg w-100 py-3 fw-bold rounded-pill shadow" onclick="checkAnswer()">
                    ENVIAR RESPOSTA <i class="fas fa-paper-plane ms-2"></i>
                </button>

                <!-- Feedback Alert -->
                <div id="game-feedback" class="alert mt-3 p-3 text-center d-none" role="alert"></div>
            </div>
        </main>

        <script src="jogo.js"></script>
    </body>
</html>

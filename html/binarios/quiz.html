<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Desafio - GamificaEduk</title>
        <link rel="shortcut icon" href="../../assets/img/favicon.png" type="image/png">
        <!-- Estilos -->
        <link rel="stylesheet" href="../../assets/css/style.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
        <!-- Firebase SDK -->
        <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-auth-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-firestore-compat.js"></script>
        <script src="../../firebase-init.js"></script>
        <script src="../../auth-guard.js"></script>
        <script src="../../services/user.service.js"></script>
        <script src="../../logout.js"></script>

        <style>
            body { background: transparent; padding: 15px; font-family: 'Segoe UI', sans-serif; }
            .card-quiz { border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
            .puzzle-context { background: #f8f9fa; border-left: 5px solid #0d6efd; padding: 20px; border-radius: 10px; font-style: italic; font-size: 0.95rem; }
            .warning-box { background: #fff3cd; color: #856404; padding: 10px; border-radius: 8px; font-size: 0.85rem; border: 1px solid #ffeeba; }
            .input-answer { border-radius: 10px; border: 2px solid #dee2e6; padding: 15px; font-weight: bold; font-size: 1.2rem; text-align: center; }
            .input-answer:focus { border-color: #0d6efd; box-shadow: none; }
        </style>
    </head>
    <body>

        <div id="loader" class="text-center py-5">
            <div class="spinner-border text-primary"></div>
            <p class="text-muted mt-2">Sincronizando desafio...</p>
        </div>

        <main id="quiz-container" class="d-none">
            <div class="card card-quiz p-4 bg-white">
                <!-- Header do Desafio -->
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <span class="badge bg-primary px-3 py-2" id="lvl-tag">NÍVEL 1</span>
                    <div class="text-end">
                        <small class="text-muted d-block uppercase font-bold" style="font-size: 0.65rem;">Recompensa</small>
                        <span class="text-success fw-bold">+<span id="points-val">0</span> XP</span>
                    </div>
                </div>

                <!-- Contexto do Enigma (pre_text) -->
                <div class="puzzle-context mb-4" id="pre-text-val"></div>

                <!-- Pergunta (text) -->
                <h2 class="h5 fw-bold text-dark mb-4" id="question-text-val"></h2>

                <!-- Input de Resposta -->
                <div class="mb-4">
                    <input type="number" id="user-answer" class="form-control input-answer" placeholder="Digite o número decimal">
                </div>

                <!-- Aviso (warning) -->
                <div class="warning-box mb-4 d-none" id="warning-val">
                    <i class="fas fa-exclamation-triangle me-2"></i> <span></span>
                </div>

                <div id="feedback" class="alert d-none mb-4"></div>

                <button class="btn btn-primary btn-lg w-100 fw-bold rounded-pill" onclick="validatePuzzle()" id="btn-submit">
                    ENVIAR RESPOSTA <i class="fas fa-key ms-2"></i>
                </button>

                <!-- Paginação Simples -->
                <div class="text-center mt-3 text-muted small">
                    Questão <span id="current-idx">1</span> de <span id="total-idx">1</span>
                </div>
            </div>
        </main>

        <script src="quiz.js"></script>
    </body>
</html>

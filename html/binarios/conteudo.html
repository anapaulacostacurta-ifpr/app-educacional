<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <link rel="shortcut icon" href="../../assets/img/favicon.png" type="image/png">
        <!-- Estilos -->
        <link rel="stylesheet" href="../../assets/css/style.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
        <!-- Firebase SDK -->
        <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-auth-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-firestore-compat.js"></script>
        <script src="../../firebase-init.js"></script>
        <script src="../../auth-guard.js"></script>
        <script src="../../services/user.service.js"></script>
        <script src="../../logout.js"></script>
        <style>
            body { background: transparent; padding: 15px; font-family: 'Segoe UI', sans-serif; }
            .card-custom { border-radius: 15px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.06); margin-bottom: 20px; transition: transform 0.2s; }
            .section-label { font-size: 0.7rem; font-weight: 800; color: #0d6efd; text-transform: uppercase; margin-bottom: 5px; display: block; }
            
            /* Controle de Expansão Individual */
            .details-wrapper { max-height: 0; opacity: 0; overflow: hidden; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
            .details-wrapper.expanded { max-height: 1500px; opacity: 1; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #eee; }
            
            .example-item { border-left: 3px solid #198754; background: #f9f9f9; padding: 8px; margin-bottom: 5px; border-radius: 4px; font-size: 0.85rem; font-family: monospace; }
            .btn-round { border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
            .completed-card { border-left: 5px solid #198754 !important; opacity: 0.8; }
        </style>
    </head>
    <body>

        <div id="loader" class="text-center py-5">
            <div class="spinner-border text-primary"></div>
            <p class="text-muted small mt-2">Carregando trilha de conhecimento...</p>
        </div>

        <!-- Container onde os cards serão injetados -->
        <main id="main-content" class="d-none">
            <div id="cards-container"></div>
        </main>

        <script src="conteudo.js"></script>
    </body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <link rel="shortcut icon" href="../../assets/img/favicon.png" type="image/png">
        <!-- Estilos -->
        <link rel="stylesheet" href="../../assets/css/style.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
        <!-- Firebase SDK -->
        <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-auth-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-firestore-compat.js"></script>
        <script src="../../firebase-init.js"></script>
        <script src="../../auth-guard.js"></script>
        <script src="../../services/user.service.js"></script>
        <script src="../../logout.js"></script>
        <style>
            body { background: transparent; padding: 15px; font-family: 'Segoe UI', sans-serif; }
            .card-custom { border-radius: 15px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.06); margin-bottom: 15px; }
            .section-label { font-size: 0.75rem; font-weight: 800; color: #0d6efd; text-transform: uppercase; margin-bottom: 8px; display: block; }
            .example-item { border-left: 3px solid #198754; background: #fdfdfd; padding: 10px; margin-bottom: 8px; border-radius: 4px; font-size: 0.9rem; font-family: monospace; }
            
            #extra-content { max-height: 0; opacity: 0; overflow: hidden; transition: all 0.6s ease; }
            #extra-content.expanded { max-height: 5000px; opacity: 1; margin-top: 15px; }
        </style>
    </head>
    <body>

        <div id="loader" class="text-center py-5">
            <div class="spinner-border text-primary"></div>
            <p class="text-muted mt-2">Sincronizando trilha...</p>
        </div>

        <div id="main-content" class="d-none">
            <!-- ÁREA INICIAL (Sempre visível) -->
            <div id="initial-cards"></div>

            <!-- BOTÃO DE EXPANSÃO -->
            <div class="text-center my-3" id="btn-container">
                <button class="btn btn-primary rounded-pill px-4 fw-bold shadow-sm" onclick="expandLesson()" id="main-action-btn">
                    VER CONTEÚDO COMPLETO <i class="fas fa-chevron-down ms-2"></i>
                </button>
            </div>

            <!-- ÁREA EXPANSÍVEL (Detalhes técnicos) -->
            <div id="extra-content">
                <div id="detailed-cards"></div>
                
                <div class="p-3 mb-5 text-center">
                    <button class="btn btn-success w-100 btn-lg fw-bold shadow" onclick="completeTask()">
                        CONCLUIR MÓDULO <i class="fas fa-check-circle ms-2"></i>
                    </button>
                </div>
            </div>
        </div>
            <!-- Scripts Finais -->
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
            <script src="conteudo.js"></script>
        </body>
</html>

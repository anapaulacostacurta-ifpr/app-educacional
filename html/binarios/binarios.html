<!DOCTYPE html>
<html class="wallpaper" lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Módulo Binários - GamificaEduk</title>
        <link rel="shortcut icon" href="../../assets/img/favicon.png" type="image/png">
        <!-- Estilos -->
        <link rel="stylesheet" href="../../assets/css/style.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
        <!-- Firebase SDK -->
        <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-auth-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-firestore-compat.js"></script>
        <script src="../../firebase-init.js"></script>
        <script src="../../services/user.service.js"></script>
        <script src="../../auth-guard.js"></script>
    </head>
    <body>
        <header class="p-3 bg-dark text-white shadow-sm">
            <div class="container d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center gap-2">
                    <img id="user-avatar" src="../../assets/img/perfil/avatar1.png" width="40" class="rounded-circle border border-primary">
                    <div>
                        <div class="fw-bold small" id="user-display-name">Carregando...</div>
                        <div class="text-warning small" style="font-size: 0.7rem;">LVL <span id="lvl-val">1</span> | <span id="xp-val">0</span> XP</div>
                    </div>
                </div>
                <button class="btn btn-sm btn-outline-info" onclick="toggleTeacherView()">Professor</button>
            </div>
        </header>

        <main class="container my-4">
            <!-- ESTUDANTE -->
            <div id="view-student">
                <div class="card p-4 shadow-sm mb-4">
                    <h2 class="h5 fw-bold mb-3">Introdução: Bits e Redes</h2>
                    <hr class="colorgraph">
                    <div id="content-area" class="mb-4">
                        <p class="small text-muted">Binários são a base da comunicação. 0 e 1 representam sinais elétricos no cabo de rede.</p>
                    </div>
                    <!-- FUNÇÃO CORRIGIDA AQUI: completeContent() -->
                    <button class="btn btn-success w-100" onclick="completeContent()">CONCLUIR AULA (+20 XP)</button>
                </div>

                <div class="card p-4 shadow-sm">
                    <h2 class="h5 fw-bold mb-3">Desafio Rápido</h2>
                    <div id="quiz-area"></div>
                </div>
            </div>

            <!-- PROFESSOR -->
            <div id="view-teacher" class="d-none">
                <div class="card p-4 shadow-sm border-primary">
                    <h3 class="h6 fw-bold text-primary mb-3">Cadastrar novo desafio</h3>
                    <input type="text" id="in-q" class="form-control mb-2" placeholder="Pergunta">
                    <input type="text" id="in-a" class="form-control mb-3" placeholder="Resposta Correta">
                    <button class="btn btn-primary w-100" onclick="saveToDatabase()">SALVAR</button>
                </div>
            </div>
        </main>

        <!-- SCRIPTS DO FIREBASE (ORDEM IMPORTANTE) -->
        <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-auth-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-firestore-compat.js"></script>
        
        <!-- SEUS SERVIÇOS (CORREÇÃO DO userService) -->
        <script src="../../firebase-init.js"></script>
        <script src="../../services/user.service.js"></script> <!-- IMPORTANTE PARA O AUTH-GUARD -->
        <script src="../../services/players.services.js"></script>
        <script src="../../services/quizzes.services.js"></script>
        <script src="../../auth-guard.js"></script>

        <!-- LÓGICA DO MÓDULO -->
        <script src="binarios.js"></script>
    </body>
</html>

<!-- html/caca_palavras/caca_palavras.html -->
<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <link rel="shortcut icon" href="../../assets/img/favicon.png" type="image/png">
        <!-- Estilos -->
        <link rel="stylesheet" href="../../assets/css/style.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
        <!-- Firebase SDK -->
        <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-auth-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-firestore-compat.js"></script>
        <script src="../../firebase-init.js"></script>
        <script src="../../auth-guard.js"></script>
        <script src="../../services/user.service.js"></script>
        <script src="../../logout.js"></script>
        <style>
                body { background: transparent; padding: 10px; font-family: 'Segoe UI', sans-serif; }
                .grid-td { 
                    width: 42px; height: 42px; text-align: center; cursor: pointer; 
                    font-weight: bold; border: 1px solid #dee2e6; transition: all 0.2s;
                    user-select: none; background: white;
                }
                .grid-td:hover { background: #e9ecef; }
                .selected { background-color: #0d6efd !important; color: white !important; transform: scale(0.95); }
                .found { background-color: #198754 !important; color: white !important; pointer-events: none; }
                .word-badge { transition: all 0.3s; font-size: 0.8rem; }
                .word-found { text-decoration: line-through; opacity: 0.6; background-color: #198754 !important; color: white !important; }
            </style>
        </head>
        <body>

            <div class="card shadow-sm border-0 p-3 bg-white">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h2 class="h6 fw-bold text-primary m-0"><i class="fas fa-search me-2"></i>CAÇA-TERMOS</h2>
                    <span class="badge bg-warning text-dark">+20 Moedas</span>
                </div>
                <hr class="colorgraph mb-3" style="height: 4px; border:none; border-radius: 5px; background: linear-gradient(to right, #c4e17f, #62c2e4);">

                <!-- Grid do Jogo -->
                <div class="d-flex justify-content-center mb-4">
                    <table id="wordsearch-grid" class="table-bordered shadow-sm">
                        <!-- Injetado via JS -->
                    </table>
                </div>

                <!-- Lista de Palavras -->
                <div class="bg-light p-3 rounded-3">
                    <p class="small fw-bold text-secondary mb-2 uppercase">Encontre as palavras:</p>
                    <div id="word-list-bank" class="d-flex flex-wrap gap-2">
                        <span id="w-BIT" class="badge border text-dark word-badge p-2">BIT</span>
                        <span id="w-BYTE" class="badge border text-dark word-badge p-2">BYTE</span>
                        <span id="w-BASE" class="badge border text-dark word-badge p-2">BASE</span>
                        <span id="w-SOMA" class="badge border text-dark word-badge p-2">SOMA</span>
                        <span id="w-ZERO" class="badge border text-dark word-badge p-2">ZERO</span>
                        <span id="w-UM" class="badge border text-dark word-badge p-2">UM</span>
                    </div>
                </div>

                <!-- Feedback Final -->
                <div id="game-feedback" class="alert alert-success mt-3 d-none text-center animate__animated animate__fadeIn">
                    <i class="fas fa-check-circle me-2"></i> <strong>Parabéns!</strong> Você encontrou todos os conceitos binários.
                </div>
            </div>
            <script src="caca_palavras.js"></script>
        </body>
</html>

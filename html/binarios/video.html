<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Vídeo Aula - GamificaEduk</title>
        <link rel="shortcut icon" href="../../assets/img/favicon.png" type="image/png">
        <!-- Estilos -->
        <link rel="stylesheet" href="../../assets/css/style.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
        <!-- Firebase SDK -->
        <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-auth-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-firestore-compat.js"></script>
        <script src="../../firebase-init.js"></script>
        <script src="../../auth-guard.js"></script>
        <script src="../../services/user.service.js"></script>
        <script src="../../logout.js"></script>

        <style>
            body { background: transparent; padding: 15px; font-family: 'Segoe UI', sans-serif; }
            .card-video { border-radius: 20px; border: none; box-shadow: 0 8px 25px rgba(0,0,0,0.08); overflow: hidden; }
            .video-container { border-radius: 10px; overflow: hidden; background: #000; }
            .btn-watch { border-radius: 50px; padding: 12px 25px; font-weight: bold; transition: all 0.3s; }
            .btn-watch.watched { background-color: #198754; border-color: #198754; color: white; cursor: default; }
        </style>
    </head>
    <body>

        <main class="container-fluid p-0">
            <div class="card card-video bg-white p-4">
                <h2 class="h5 fw-bold text-dark mb-1">Cine Redes: Números Binários</h2>
                <p class="text-muted small mb-3">Assista à explicação completa para ganhar +10 XP.</p>
                
                <hr class="opacity-10 mb-4">

                <!-- Container do Vídeo -->
                <div class="video-container ratio ratio-16x9 mb-4 shadow-sm">
                    <!-- Substitua 'ID_DO_VIDEO' pelo ID real do YouTube -->
                    <iframe width="560" height="315" src="https://www.youtube.com/embed/K5tkGlFYtkQ?si=lKl_N2RRU3V08x9p" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
                </div>

                <!-- Ação de Gamificação -->
                <div id="video-actions" class="text-center">
                    <button id="btn-mark-watched" class="btn btn-outline-primary btn-watch w-100" onclick="markAsWatched()">
                        <i class="fas fa-check-circle me-2"></i> MARCAR COMO ASSISTIDO
                    </button>
                    <div id="watched-feedback" class="text-success mt-2 d-none fw-bold small">
                        <i class="fas fa-star me-1"></i> +10 XP coletados!
                    </div>
                </div>
            </div>
        </main>

        <script src="video.js"></script>
    </body>
</html>
